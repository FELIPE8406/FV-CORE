<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <g stroke="#00ff41" stroke-width="0.3" opacity="0.15">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>
  
  <!-- Vinyl record circles -->
  <circle cx="200" cy="190" r="120" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <circle cx="200" cy="190" r="100" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.2"/>
  <circle cx="200" cy="190" r="80" fill="none" stroke="#bc13fe" stroke-width="0.5" opacity="0.3"/>
  <circle cx="200" cy="190" r="60" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.2"/>
  <circle cx="200" cy="190" r="40" fill="#0a0a0a" stroke="#bc13fe" stroke-width="1" opacity="0.5"/>
  <circle cx="200" cy="190" r="8" fill="#00ff41" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Music note -->
  <g transform="translate(175, 145)" filter="url(#glowStrong)">
    <path d="M20 0 L20 55 C20 65 8 70 4 65 C0 60 8 52 16 54 L16 10 L42 4 L42 48 C42 58 30 63 26 58 C22 53 30 45 38 47 L38 0 Z" 
          fill="#00ff41" opacity="0.9"/>
  </g>
  
  <!-- FV-CORE text -->
  <text x="200" y="350" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#00ff41" filter="url(#glow)">FV-CORE</text>
  <text x="200" y="375" text-anchor="middle" font-family="monospace" font-size="11" fill="#bc13fe" opacity="0.7">SIN PORTADA</text>
  
  <!-- Corner decorations -->
  <g stroke="#00ff41" stroke-width="1.5" opacity="0.5">
    <polyline points="5,25 5,5 25,5" fill="none"/>
    <polyline points="375,5 395,5 395,25" fill="none"/>
    <polyline points="5,375 5,395 25,395" fill="none"/>
    <polyline points="375,395 395,395 395,375" fill="none"/>
  </g>
</svg>
